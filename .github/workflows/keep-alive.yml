name: Keep Render Alive

on:
  schedule:
    # 每天每 10 分鐘執行一次
    - cron: '*/10 * * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Backend Health Endpoint
        run: |
          curl -f https://wealthtracker-api-wu7i.onrender.com/health || echo "Failed to ping, but workflow continues"
